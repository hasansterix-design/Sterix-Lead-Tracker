<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sterix Global — Inventory & Orders</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0b2545" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --navy:#0b2545;
    --navy-light:#13335c;
    --teal:#0f6e56;
    --teal-light:#e1f5ee;
    --sky:#378ADD;
    --sky-light:#e6f1fb;
    --bg:#f4f6f9;
    --card:#ffffff;
    --border:#e3e7ee;
    --text:#1c2533;
    --text-secondary:#5b6678;
    --text-tertiary:#8b94a3;
    --danger:#c0392b;
    --danger-bg:#fdecea;
    --warning:#b7791f;
    --warning-bg:#fdf3df;
    --success:#1d9e75;
    --success-bg:#e1f5ee;
    --radius-md:8px;
    --radius-lg:12px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
  }
  .app{max-width:1280px;margin:0 auto;padding:20px 24px 60px;}

  /* Header */
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .header-left{display:flex;align-items:center;gap:14px;}
  .logo{display:flex;align-items:center;gap:8px;}
  .logo-mark{width:32px;height:32px;border-radius:50%;background:var(--sky);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:15px;flex-shrink:0;}
  .logo-text{display:flex;flex-direction:column;line-height:1.1;}
  .logo-text .name{font-weight:700;font-size:13px;color:var(--navy);letter-spacing:0.5px;}
  .logo-text .sub{font-size:9px;color:var(--text-tertiary);letter-spacing:1px;}
  .title-block .title{font-size:19px;font-weight:600;color:var(--navy);margin:0;}
  .title-block .subtitle{font-size:13px;color:var(--text-secondary);margin:2px 0 0;}
  .user-pill{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text);}
  .avatar{width:30px;height:30px;border-radius:50%;background:var(--teal);color:white;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;}
  .logout-btn{background:none;border:none;color:var(--text-tertiary);font-size:12px;cursor:pointer;text-decoration:underline;padding:0;margin-left:6px;}

  /* Tabs */
  .tabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:1px solid var(--border);}
  .tab{padding:10px 18px;font-size:14px;font-weight:600;color:var(--text-secondary);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;border-radius:8px 8px 0 0;}
  .tab.active{color:var(--navy);background:var(--card);border:1px solid var(--border);border-bottom:2px solid var(--card);margin-bottom:-1px;}

  /* Toolbar */
  .toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .toolbar input[type="text"]{flex:1;min-width:200px;padding:9px 14px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:14px;background:var(--card);}
  .toolbar select{padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:14px;background:var(--card);color:var(--text);}
  .btn{padding:9px 16px;border-radius:var(--radius-md);font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);display:inline-flex;align-items:center;gap:6px;}
  .btn-primary{background:var(--navy);color:white;border-color:var(--navy);}
  .btn-primary:hover{background:var(--navy-light);}
  .btn:hover{background:var(--bg);}

  /* Alert banner */
  .alert{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:var(--radius-md);font-size:13px;margin-bottom:16px;}
  .alert-danger{background:var(--danger-bg);color:#8a2c20;}
  .alert-warning{background:var(--warning-bg);color:#8a6116;}

  /* Stat cards */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;}
  .stat-label{font-size:12px;color:var(--text-secondary);margin:0 0 6px;}
  .stat-value{font-size:24px;font-weight:700;margin:0;color:var(--navy);}
  .stat-value.danger{color:var(--danger);}
  .stat-value.warning{color:var(--warning);}

  /* Table */
  .table-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{text-align:left;padding:10px 14px;color:var(--text-secondary);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.4px;border-bottom:1px solid var(--border);background:var(--bg);}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#fafbfd;}
  .sku-name{font-weight:600;color:var(--text);}
  .sku-sub{font-size:12px;color:var(--text-tertiary);}
  .sku-icon{width:30px;height:30px;border-radius:6px;background:var(--sky-light);display:flex;align-items:center;justify-content:center;margin-right:10px;flex-shrink:0;}
  .sku-cell{display:flex;align-items:center;}

  .stock-bar-wrap{display:flex;flex-direction:column;gap:4px;min-width:110px;}
  .stock-qty{font-weight:700;font-size:13px;}
  .stock-bar-bg{height:5px;background:var(--border);border-radius:3px;overflow:hidden;width:100%;}
  .stock-bar-fill{height:100%;border-radius:3px;}
  .fill-ok{background:var(--success);}
  .fill-low{background:#e09f3e;}
  .fill-critical{background:var(--danger);}

  .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;}
  .pill-ok{background:var(--success-bg);color:var(--success);}
  .pill-low{background:var(--warning-bg);color:var(--warning);}
  .pill-critical{background:var(--danger-bg);color:var(--danger);}

  .icon-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);}
  .icon-btn:hover{background:var(--bg);}

  /* Stage tracker */
  .stage-track{display:flex;align-items:center;gap:0;}
  .stage-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;}
  .stage-line{width:20px;height:2px;flex-shrink:0;}
  .stage-label{font-size:12px;font-weight:600;margin-top:4px;}

  /* Empty state */
  .empty-state{padding:50px 20px;text-align:center;color:var(--text-tertiary);}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(11,37,69,0.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal{background:var(--card);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;}
  .modal h3{margin:0 0 16px;font-size:17px;color:var(--navy);}
  .form-row{margin-bottom:14px;}
  .form-row label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:5px;}
  .form-row input,.form-row select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:14px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
  .line-item-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:10px;}

  /* Login */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
  .login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px 32px;width:100%;max-width:360px;text-align:center;}
  .login-card .logo-mark{width:48px;height:48px;font-size:20px;margin:0 auto 14px;}
  .login-card h2{margin:0 0 4px;color:var(--navy);font-size:18px;}
  .login-card p{margin:0 0 22px;color:var(--text-secondary);font-size:13px;}
  .login-card input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:14px;margin-bottom:10px;}
  .login-card .btn-primary{width:100%;padding:10px;margin-top:4px;}
  .login-error{color:var(--danger);font-size:13px;margin-top:10px;}

  .hidden{display:none !important;}
  .text-right{text-align:right;}

  @media(max-width:900px){
    .stats{grid-template-columns:repeat(2,1fr);}
    .toolbar select{display:none;}
  }
</style>
</head>
<body>

<div id="login-screen" class="login-wrap hidden">
  <div class="login-card">
    <div class="logo-mark">S</div>
    <h2>Sterix Global</h2>
    <p>Sign in with the username and password you set up.</p>
    <input type="text" id="login-username" placeholder="Username" autocomplete="username" />
    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
    <button class="btn btn-primary" id="login-btn">Sign in</button>
    <div class="login-error hidden" id="login-error"></div>
  </div>
</div>

<div id="app-screen" class="app hidden">

  <div class="header">
    <div class="header-left">
      <div class="logo">
        <div class="logo-mark">S</div>
        <div class="logo-text">
          <span class="name">STERIX</span>
          <span class="sub">GLOBAL</span>
        </div>
      </div>
      <div class="title-block">
        <p class="title" id="page-title">Inventory Tracker</p>
        <p class="subtitle" id="page-subtitle">Stock across 5 categories · 12 SKUs</p>
      </div>
    </div>
    <div class="user-pill">
      <div class="avatar" id="user-avatar">H</div>
      <span id="user-name">—</span>
      <button class="logout-btn" id="logout-btn">Sign out</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="inventory">Inventory</button>
    <button class="tab" data-tab="orders">Orders</button>
  </div>

  <!-- ============ INVENTORY TAB ============ -->
  <div id="inventory-tab">
    <div class="toolbar">
      <input type="text" id="inv-search" placeholder="Search SKU, batch, or category..." />
      <select id="inv-category-filter">
        <option value="">All categories</option>
      </select>
      <select id="inv-status-filter">
        <option value="">All statuses</option>
        <option value="ok">In stock</option>
        <option value="low">Low stock</option>
        <option value="critical">Reorder now</option>
      </select>
      <button class="btn" id="inv-export-btn"><i class="ti ti-download"></i>Export</button>
      <button class="btn btn-primary" id="receive-stock-btn">+ Receive stock</button>
      <button class="btn" id="add-sku-btn">+ Add SKU</button>
    </div>

    <div id="inv-alert-wrap"></div>

    <div class="stats" id="inv-stats"></div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>SKU</th><th>Batch no.</th><th>Expiry</th><th>Stock</th><th>Reorder at</th><th>Status</th><th></th>
          </tr>
        </thead>
        <tbody id="inv-table-body"></tbody>
      </table>
      <div class="empty-state hidden" id="inv-empty">No SKUs match your filters.</div>
    </div>
  </div>

  <!-- ============ ORDERS TAB ============ -->
  <div id="orders-tab" class="hidden">
    <div class="toolbar">
      <input type="text" id="ord-search" placeholder="Search order ID, company, or city..." />
      <select id="ord-stage-filter">
        <option value="">All stages</option>
        <option value="intake">Intake</option>
        <option value="confirmed">Confirmed</option>
        <option value="production">Production</option>
        <option value="qc">QC</option>
        <option value="dispatched">Dispatched</option>
      </select>
      <button class="btn" id="ord-export-btn"><i class="ti ti-download"></i>Export</button>
      <button class="btn btn-primary" id="new-order-btn">+ New order</button>
    </div>

    <div id="ord-alert-wrap"></div>

    <div class="stats" id="ord-stats"></div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Order</th><th>Customer</th><th>Items</th><th>Value</th><th>Stage</th><th></th>
          </tr>
        </thead>
        <tbody id="ord-table-body"></tbody>
      </table>
      <div class="empty-state hidden" id="ord-empty">No orders match your filters.</div>
    </div>
  </div>

</div>

<!-- ============ MODALS ============ -->
<div id="modal-root"></div>

<script>
// ============================================================
// CONFIG — paste your Lead Tracker's Supabase credentials here
// ============================================================
const SUPABASE_URL = 'https://tdxzbdkvzicizmglcbxk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_WmkXH8a3wOWgIzPS6_FJvA_eJF5wCfi';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null; // { username }
let skus = [];        // from sku_stock view
let batches = [];     // raw batches (for receive/expiry detail)
let orders = [];
let orderItems = [];

const STAGES = ['intake','confirmed','production','qc','dispatched'];
const STAGE_LABELS = {intake:'Intake', confirmed:'Confirmed', production:'Production', qc:'QC', dispatched:'Dispatched'};

// ---------------- AUTH ----------------
// Matches the Lead Tracker's auth model: a plain `team_members` table
// (username, password columns), session remembered via localStorage —
// not Supabase Auth.
function checkSession(){
  const saved = localStorage.getItem('sterix_lead_user');
  if(saved){
    currentUser = { username: saved };
    showApp();
  } else {
    showLogin();
  }
}

function showLogin(){
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app-screen').classList.add('hidden');
}

function showApp(){
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
  const name = currentUser.username || '';
  document.getElementById('user-name').textContent = name;
  document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
  loadAll();
}

document.getElementById('login-btn').addEventListener('click', async () => {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');

  if(!username || !password){
    errEl.textContent = 'Enter both your username and password.';
    errEl.classList.remove('hidden');
    return;
  }

  const { data, error } = await sb
    .from('team_members')
    .select('username, password')
    .ilike('username', username)
    .limit(1);

  if(error){
    errEl.textContent = "Couldn't check your login — try again.";
    errEl.classList.remove('hidden');
    return;
  }
  if(!data || data.length === 0 || data[0].password !== password){
    errEl.textContent = 'Incorrect username or password.';
    errEl.classList.remove('hidden');
    return;
  }

  currentUser = { username: data[0].username };
  localStorage.setItem('sterix_lead_user', data[0].username);
  showApp();
});

document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem('sterix_lead_user');
  currentUser = null;
  showLogin();
});

// ---------------- TABS ----------------
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const which = tab.dataset.tab;
    document.getElementById('inventory-tab').classList.toggle('hidden', which !== 'inventory');
    document.getElementById('orders-tab').classList.toggle('hidden', which !== 'orders');
    document.getElementById('page-title').textContent = which === 'inventory' ? 'Inventory Tracker' : 'Order Management';
    document.getElementById('page-subtitle').textContent = which === 'inventory'
      ? `Stock across ${new Set(skus.map(s=>s.category)).size} categories · ${skus.length} SKUs`
      : 'Intake → Production → Dispatch';
  });
});

// ---------------- DATA LOADING ----------------
async function loadAll(){
  await Promise.all([loadSkus(), loadOrders()]);
  renderInventory();
  renderOrders();
}

async function loadSkus(){
  const { data, error } = await sb.from('sku_stock').select('*').order('category').order('name');
  if(error){ console.error(error); return; }
  skus = data || [];

  const catFilter = document.getElementById('inv-category-filter');
  const cats = [...new Set(skus.map(s => s.category))];
  catFilter.innerHTML = '<option value="">All categories</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
}

async function loadOrders(){
  const { data: ordData, error: ordErr } = await sb.from('orders').select('*').order('created_at', {ascending:false});
  if(ordErr){ console.error(ordErr); return; }
  orders = ordData || [];

  const { data: itemData, error: itemErr } = await sb.from('order_items').select('*, skus(name)');
  if(itemErr){ console.error(itemErr); return; }
  orderItems = itemData || [];
}

// ---------------- INVENTORY RENDER ----------------
function stockStatus(s){
  if(s.current_stock <= s.reorder_at * 0.5) return 'critical';
  if(s.current_stock <= s.reorder_at) return 'low';
  return 'ok';
}

function renderInventory(){
  const search = document.getElementById('inv-search').value.toLowerCase();
  const catF = document.getElementById('inv-category-filter').value;
  const statusF = document.getElementById('inv-status-filter').value;

  let filtered = skus.filter(s => {
    const matchesSearch = !search || s.name.toLowerCase().includes(search) || (s.category||'').toLowerCase().includes(search);
    const matchesCat = !catF || s.category === catF;
    const matchesStatus = !statusF || stockStatus(s) === statusF;
    return matchesSearch && matchesCat && matchesStatus;
  });

  // stats
  const critical = skus.filter(s => stockStatus(s) === 'critical');
  const low = skus.filter(s => stockStatus(s) === 'low');
  const totalUnits = skus.reduce((sum,s) => sum + Number(s.current_stock), 0);
  const sixMonthsOut = new Date(); sixMonthsOut.setMonth(sixMonthsOut.getMonth()+6);
  const expiringSoon = skus.filter(s => s.nearest_expiry && new Date(s.nearest_expiry) <= sixMonthsOut);

  document.getElementById('inv-stats').innerHTML = `
    <div class="stat-card"><p class="stat-label">Total SKUs</p><p class="stat-value">${skus.length}</p></div>
    <div class="stat-card"><p class="stat-label">Critical</p><p class="stat-value danger">${critical.length}</p></div>
    <div class="stat-card"><p class="stat-label">Low stock</p><p class="stat-value warning">${low.length}</p></div>
    <div class="stat-card"><p class="stat-label">Total units</p><p class="stat-value">${totalUnits.toLocaleString('en-IN')}</p></div>
    <div class="stat-card"><p class="stat-label">Expiring &lt;6mo</p><p class="stat-value warning">${expiringSoon.length}</p></div>
  `;

  if(critical.length > 0){
    document.getElementById('inv-alert-wrap').innerHTML = `
      <div class="alert alert-danger"><i class="ti ti-alert-triangle"></i>
        ${critical.length} SKU${critical.length>1?'s':''} need reordering now: ${critical.map(s=>s.name).join(', ')}
      </div>`;
  } else {
    document.getElementById('inv-alert-wrap').innerHTML = '';
  }

  const tbody = document.getElementById('inv-table-body');
  document.getElementById('inv-empty').classList.toggle('hidden', filtered.length > 0);

  tbody.innerHTML = filtered.map(s => {
    const status = stockStatus(s);
    const pillClass = status === 'ok' ? 'pill-ok' : status === 'low' ? 'pill-low' : 'pill-critical';
    const pillLabel = status === 'ok' ? 'In stock' : status === 'low' ? 'Low stock' : 'Reorder now';
    const fillClass = status === 'ok' ? 'fill-ok' : status === 'low' ? 'fill-low' : 'fill-critical';
    const pct = Math.min(100, Math.round((s.current_stock / Math.max(s.reorder_at*2,1)) * 100));
    const expiry = s.nearest_expiry ? new Date(s.nearest_expiry).toLocaleDateString('en-IN', {month:'short', year:'numeric'}) : '—';

    return `
      <tr>
        <td>
          <div class="sku-cell">
            <div class="sku-icon"><i class="ti ti-vaccine" style="color:var(--sky);font-size:16px;"></i></div>
            <div>
              <div class="sku-name">${s.name}</div>
              <div class="sku-sub">${s.category} · ${s.subtype || ''}</div>
            </div>
          </div>
        </td>
        <td>—</td>
        <td>${expiry}</td>
        <td>
          <div class="stock-bar-wrap">
            <span class="stock-qty">${Number(s.current_stock).toLocaleString('en-IN')} ${s.unit}</span>
            <div class="stock-bar-bg"><div class="stock-bar-fill ${fillClass}" style="width:${pct}%"></div></div>
          </div>
        </td>
        <td>${Number(s.reorder_at).toLocaleString('en-IN')} ${s.unit}</td>
        <td><span class="pill ${pillClass}">${pillLabel}</span></td>
        <td><button class="icon-btn" onclick="openReceiveModal('${s.sku_id}')" aria-label="Receive stock"><i class="ti ti-package-import"></i></button></td>
      </tr>`;
  }).join('');
}

['inv-search','inv-category-filter','inv-status-filter'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderInventory);
  document.getElementById(id).addEventListener('change', renderInventory);
});

// ---------------- ORDERS RENDER ----------------
function renderOrders(){
  const search = document.getElementById('ord-search').value.toLowerCase();
  const stageF = document.getElementById('ord-stage-filter').value;

  let filtered = orders.filter(o => {
    const matchesSearch = !search || o.order_no.toLowerCase().includes(search) || o.customer_name.toLowerCase().includes(search) || (o.city||'').toLowerCase().includes(search);
    const matchesStage = !stageF || o.stage === stageF;
    return matchesSearch && matchesStage;
  });

  const openOrders = orders.filter(o => o.stage !== 'dispatched');
  const inProduction = orders.filter(o => o.stage === 'production');
  const inQC = orders.filter(o => o.stage === 'qc');
  const today = new Date().toDateString();
  const dispatchedToday = orders.filter(o => o.stage === 'dispatched' && new Date(o.stage_entered_at).toDateString() === today);
  const totalValue = orders.reduce((sum,o) => sum + Number(o.order_value), 0);

  document.getElementById('ord-stats').innerHTML = `
    <div class="stat-card"><p class="stat-label">Open orders</p><p class="stat-value">${openOrders.length}</p></div>
    <div class="stat-card"><p class="stat-label">In production</p><p class="stat-value warning">${inProduction.length}</p></div>
    <div class="stat-card"><p class="stat-label">In QC</p><p class="stat-value warning">${inQC.length}</p></div>
    <div class="stat-card"><p class="stat-label">Dispatched today</p><p class="stat-value">${dispatchedToday.length}</p></div>
    <div class="stat-card"><p class="stat-label">Order value</p><p class="stat-value">₹${totalValue.toLocaleString('en-IN')}</p></div>
  `;

  const stuck = orders.filter(o => {
    if(o.stage === 'dispatched') return false;
    const days = (Date.now() - new Date(o.stage_entered_at)) / 86400000;
    return days >= 3;
  });
  if(stuck.length > 0){
    document.getElementById('ord-alert-wrap').innerHTML = `
      <div class="alert alert-warning"><i class="ti ti-clock"></i>
        ${stuck.length} order${stuck.length>1?'s':''} waiting 3+ days: ${stuck.map(o=>o.order_no).join(', ')}
      </div>`;
  } else {
    document.getElementById('ord-alert-wrap').innerHTML = '';
  }

  const tbody = document.getElementById('ord-table-body');
  document.getElementById('ord-empty').classList.toggle('hidden', filtered.length > 0);

  tbody.innerHTML = filtered.map(o => {
    const items = orderItems.filter(i => i.order_id === o.id);
    const itemsLabel = items.map(i => `${i.skus?.name || '—'} x ${Number(i.qty).toLocaleString('en-IN')}`).join(', ') || '—';
    const stageIdx = STAGES.indexOf(o.stage);

    const dots = STAGES.map((st, idx) => {
      const isDone = idx < stageIdx;
      const isCurrent = idx === stageIdx;
      let bg = 'var(--border)', color='var(--text-tertiary)';
      if(isDone){ bg = 'var(--teal)'; color='white'; }
      if(isCurrent){ bg = o.stage === 'dispatched' ? 'var(--teal)' : 'var(--sky)'; color='white'; }
      const line = idx > 0 ? `<div class="stage-line" style="background:${idx <= stageIdx ? 'var(--teal)' : 'var(--border)'}"></div>` : '';
      return `${line}<div class="stage-dot" style="background:${bg};color:${color}">${idx+1}</div>`;
    }).join('');

    return `
      <tr>
        <td><strong>${o.order_no}</strong><div class="sku-sub">${new Date(o.created_at).toLocaleDateString('en-IN',{day:'2-digit',month:'2-digit'})}</div></td>
        <td>${o.customer_name}<div class="sku-sub">${o.city||''}</div></td>
        <td>${itemsLabel}</td>
        <td>₹${Number(o.order_value).toLocaleString('en-IN')}</td>
        <td>
          <div class="stage-track">${dots}</div>
          <div class="stage-label" style="color:${o.stage==='dispatched'?'var(--success)':'var(--sky)'}">${STAGE_LABELS[o.stage]}</div>
        </td>
        <td><button class="icon-btn" onclick="openOrderModal('${o.id}')" aria-label="Edit order"><i class="ti ti-edit"></i></button></td>
      </tr>`;
  }).join('');
}

['ord-search','ord-stage-filter'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderOrders);
  document.getElementById(id).addEventListener('change', renderOrders);
});

// ---------------- MODALS: Receive stock ----------------
function openReceiveModal(skuId){
  const sku = skus.find(s => s.sku_id === skuId);
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal">
        <h3>Receive stock — ${sku ? sku.name : ''}</h3>
        <div class="form-row"><label>Batch number</label><input type="text" id="rcv-batch" placeholder="e.g. SG-RB02-0726" /></div>
        <div class="form-row"><label>Expiry date</label><input type="date" id="rcv-expiry" /></div>
        <div class="form-row"><label>Quantity received</label><input type="number" id="rcv-qty" min="1" /></div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="submitReceiveStock('${skuId}')">Receive stock</button>
        </div>
      </div>
    </div>`;
}

async function submitReceiveStock(skuId){
  const batchNo = document.getElementById('rcv-batch').value.trim();
  const expiry = document.getElementById('rcv-expiry').value;
  const qty = Number(document.getElementById('rcv-qty').value);
  if(!batchNo || !qty || qty <= 0){ alert('Enter a batch number and a valid quantity.'); return; }

  const { data: batch, error: batchErr } = await sb.from('batches').insert({
    sku_id: skuId, batch_no: batchNo, expiry_date: expiry || null,
    qty_received: qty, qty_remaining: qty, received_by: currentUser.username
  }).select().single();
  if(batchErr){ alert('Error: ' + batchErr.message); return; }

  await sb.from('stock_movements').insert({
    sku_id: skuId, batch_id: batch.id, movement_type: 'receive',
    qty_change: qty, created_by: currentUser.username
  });

  closeModal();
  await loadSkus();
  renderInventory();
}

// ---------------- MODALS: Add SKU ----------------
document.getElementById('add-sku-btn').addEventListener('click', () => {
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal">
        <h3>Add new SKU</h3>
        <div class="form-row"><label>Name</label><input type="text" id="new-sku-name" placeholder="e.g. 50 mL With Needle" /></div>
        <div class="form-row"><label>Category</label><input type="text" id="new-sku-category" placeholder="e.g. Syringes w/ Needle" /></div>
        <div class="form-row"><label>Subtype</label><input type="text" id="new-sku-subtype" placeholder="e.g. Ribbon Pack" /></div>
        <div class="form-row"><label>Unit</label><input type="text" id="new-sku-unit" value="pcs" /></div>
        <div class="form-row"><label>Reorder at</label><input type="number" id="new-sku-reorder" placeholder="e.g. 2000" /></div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="submitNewSku()">Add SKU</button>
        </div>
      </div>
    </div>`;
});

async function submitNewSku(){
  const name = document.getElementById('new-sku-name').value.trim();
  const category = document.getElementById('new-sku-category').value.trim();
  const subtype = document.getElementById('new-sku-subtype').value.trim();
  const unit = document.getElementById('new-sku-unit').value.trim() || 'pcs';
  const reorder = Number(document.getElementById('new-sku-reorder').value) || 0;
  if(!name || !category){ alert('Name and category are required.'); return; }

  const { error } = await sb.from('skus').insert({ name, category, subtype, unit, reorder_at: reorder });
  if(error){ alert('Error: ' + error.message); return; }

  closeModal();
  await loadSkus();
  renderInventory();
}

document.getElementById('receive-stock-btn').addEventListener('click', () => {
  if(skus.length === 0){ alert('Add a SKU first.'); return; }
  // open a picker if no specific SKU context
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal">
        <h3>Receive stock</h3>
        <div class="form-row">
          <label>SKU</label>

// ---------------- MODALS: New / Edit Order ----------------
let lineItemCount = 0;

document.getElementById('new-order-btn').addEventListener('click', () => openOrderModal(null));

function openOrderModal(orderId){
  const order = orderId ? orders.find(o => o.id === orderId) : null;
  const existingItems = order ? orderItems.filter(i => i.order_id === order.id) : [];
  lineItemCount = 0;

  document.getElementById('modal-root').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal">
        <h3>${order ? 'Edit order ' + order.order_no : 'New order'}</h3>
        <div class="form-row"><label>Customer name</label><input type="text" id="ord-customer" value="${order ? order.customer_name : ''}" /></div>
        <div class="form-row"><label>City</label><input type="text" id="ord-city" value="${order ? (order.city||'') : ''}" /></div>
        <div class="form-row">
          <label>Stage</label>
          <select id="ord-stage-select">
            ${STAGES.map(st => `<option value="${st}" ${order && order.stage===st ? 'selected':''}>${STAGE_LABELS[st]}</option>`).join('')}
          </select>
        </div>
        <div class="form-row"><label>Line items</label><div id="line-items-wrap"></div>
          <button class="btn" type="button" onclick="addLineItemRow()" style="margin-top:6px;">+ Add item</button>
        </div>
        <div class="form-row"><label>Order value (₹)</label><input type="number" id="ord-value" value="${order ? order.order_value : ''}" /></div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="submitOrder(${order ? `'${order.id}'` : 'null'})">${order ? 'Save changes' : 'Create order'}</button>
        </div>
      </div>
    </div>`;

  if(existingItems.length > 0){
    existingItems.forEach(i => addLineItemRow(i.sku_id, i.qty));
  } else {
    addLineItemRow();
  }
}

function addLineItemRow(selectedSkuId, qty){
  lineItemCount++;
  const rowId = `li-${lineItemCount}`;
  const wrap = document.getElementById('line-items-wrap');
  const row = document.createElement('div');
  row.className = 'line-item-row';
  row.id = rowId;
  row.innerHTML = `
    <select class="li-sku">${skus.map(s => `<option value="${s.sku_id}" ${selectedSkuId===s.sku_id?'selected':''}>${s.name}</option>`).join('')}</select>
    <input type="number" class="li-qty" placeholder="Qty" value="${qty || ''}" />
    <input type="number" class="li-price" placeholder="Unit ₹" />
    <button class="icon-btn" type="button" onclick="document.getElementById('${rowId}').remove()" aria-label="Remove"><i class="ti ti-x"></i></button>
  `;
  wrap.appendChild(row);
}

async function submitOrder(orderId){
  const customer = document.getElementById('ord-customer').value.trim();
  const city = document.getElementById('ord-city').value.trim();
  const newStage = document.getElementById('ord-stage-select').value;
  const value = Number(document.getElementById('ord-value').value) || 0;
  if(!customer){ alert('Customer name is required.'); return; }

  const lineRows = [...document.querySelectorAll('.line-item-row')];
  const items = lineRows.map(row => ({
    sku_id: row.querySelector('.li-sku').value,
    qty: Number(row.querySelector('.li-qty').value) || 0,
    unit_price: Number(row.querySelector('.li-price').value) || null
  })).filter(i => i.qty > 0);

  let order;
  const previousStage = orderId ? orders.find(o => o.id === orderId)?.stage : null;

  if(orderId){
    const updatePayload = { customer_name: customer, city, order_value: value };
    if(newStage !== previousStage){ updatePayload.stage = newStage; updatePayload.stage_entered_at = new Date().toISOString(); }
    const { data, error } = await sb.from('orders').update(updatePayload).eq('id', orderId).select().single();
    if(error){ alert('Error: ' + error.message); return; }
    order = data;
    await sb.from('order_items').delete().eq('order_id', orderId);
  } else {
    const orderNo = 'ORD-' + (1041 + orders.length + 1);
    const { data, error } = await sb.from('orders').insert({
      order_no: orderNo, customer_name: customer, city, stage: newStage,
      order_value: value, created_by: currentUser.username
    }).select().single();
    if(error){ alert('Error: ' + error.message); return; }
    order = data;
  }

  if(items.length > 0){
    await sb.from('order_items').insert(items.map(i => ({ ...i, order_id: order.id, line_value: i.qty * (i.unit_price||0) })));
  }

  // Auto-deduct stock if newly moved into 'dispatched'
  if(newStage === 'dispatched' && previousStage !== 'dispatched'){
    await deductStockForOrder(order.id, items);
  }

  closeModal();
  await loadAll();
}

async function deductStockForOrder(orderId, items){
  for(const item of items){
    // Pull batches for this SKU, oldest expiry first (FEFO), deduct qty
    const { data: skuBatches } = await sb.from('batches')
      .select('*').eq('sku_id', item.sku_id).gt('qty_remaining', 0)
      .order('expiry_date', { ascending: true });

    let remaining = item.qty;
    for(const batch of (skuBatches || [])){
      if(remaining <= 0) break;
      const deduct = Math.min(remaining, batch.qty_remaining);
      await sb.from('batches').update({ qty_remaining: batch.qty_remaining - deduct }).eq('id', batch.id);
      await sb.from('stock_movements').insert({
        sku_id: item.sku_id, batch_id: batch.id, movement_type: 'dispatch',
        qty_change: -deduct, ref_order_id: orderId, created_by: currentUser.username
      });
      remaining -= deduct;
    }
    if(remaining > 0){
      // Not enough batch stock on record — log a negative adjustment so it's visible, don't block dispatch
      await sb.from('stock_movements').insert({
        sku_id: item.sku_id, movement_type: 'dispatch', qty_change: -remaining,
        ref_order_id: orderId, note: 'Dispatched beyond recorded batch stock', created_by: currentUser.username
      });
    }
  }
}

function closeModal(){
  document.getElementById('modal-root').innerHTML = '';
}

// ---------------- EXPORT ----------------
function exportToCSV(rows, headers, filename){
  const csv = [headers.join(',')].concat(
    rows.map(r => headers.map(h => `"${String(r[h] ?? '').replace(/"/g,'""')}"`).join(','))
  ).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('inv-export-btn').addEventListener('click', () => {
  const rows = skus.map(s => ({ name:s.name, category:s.category, subtype:s.subtype, current_stock:s.current_stock, reorder_at:s.reorder_at, nearest_expiry:s.nearest_expiry }));
  exportToCSV(rows, ['name','category','subtype','current_stock','reorder_at','nearest_expiry'], 'sterix-inventory.csv');
});

document.getElementById('ord-export-btn').addEventListener('click', () => {
  const rows = orders.map(o => ({ order_no:o.order_no, customer_name:o.customer_name, city:o.city, stage:o.stage, order_value:o.order_value }));
  exportToCSV(rows, ['order_no','customer_name','city','stage','order_value'], 'sterix-orders.csv');
});
